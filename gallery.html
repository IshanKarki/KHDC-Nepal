<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Gallery</title>
    <link rel="stylesheet" href="gallery.css">

</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Our Gallery</h1>
            <div class="synopsis">
                <p>Capture the moments of shared experiences that defines our work.</p>
            </div>
        </div>

        <div class="gallery">
            <div class="gallery-item">
                <img src="images/1.jpg" alt="Beautiful Sunset">
                <div class="gallery-item-overlay">
                    <div class="gallery-item-date">Jan 15, 2024</div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="images/2.jpg" alt="Mountain Adventure">
                <div class="gallery-item-overlay">
                    <div class="gallery-item-date">Feb 03, 2024</div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="images/3.jpg" alt="Family Time">
                <div class="gallery-item-overlay">
                    <div class="gallery-item-date">Feb 14, 2024</div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="images/4.png" alt="Night Lights">
                <div class="gallery-item-overlay">
                    <div class="gallery-item-date">Feb 20, 2024</div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="images/5.png" alt="Beach Days">
                <div class="gallery-item-overlay">
                    <div class="gallery-item-date">Mar 05, 2024</div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="images/6.png" alt="Ocean Waves">
                <div class="gallery-item-overlay">
                    <div class="gallery-item-date">Mar 12, 2024</div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="images/7.png" alt="City Exploration">
                <div class="gallery-item-overlay">
                    <div class="gallery-item-date">Mar 18, 2024</div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="images/8.jpg" alt="Forest Walk">
                <div class="gallery-item-overlay">
                    <div class="gallery-item-date">Mar 25, 2024</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn">Load More</button>
            <button class="btn">View All</button>
        </div>
    </div>
</body>

</html>
